<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' https://scripts.simpleanalyticscdn.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src 'self' https://backend.access.denied.online; img-src 'self' https://api.dicebear.com https://queue.simpleanalyticscdn.com data:;">
    <title>Scoreboard - Access Denied? CTF</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <meta name="description" content="See who's leading the Access Denied? CTF competition.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Permanent+Marker&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="src/css/base.css">
    <link rel="stylesheet" href="src/css/nav.css">
    <link rel="stylesheet" href="src/css/footer.css">
    <link rel="stylesheet" href="src/css/scoreboard.css">
    <link rel="stylesheet" href="src/css/toast.css">
</head>

<body>
    <div class="footprints-container" id="footprints"></div>

    <nav class="navbar">
        <div class="logo-wrapper">
            <a href="index.html" class="logo-link">
                <img src="AccessDeniedLogo.png" alt="Access Denied Logo" class="logo-img">
            </a>
        </div>
        <div class="nav-links">
            <a href="index.html" class="nav-btn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
                home
            </a>
            <a href="index.html#phasesScroll" class="nav-btn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242"></path>
                    <path d="M12 12v9"></path>
                    <path d="m8 17 4 4 4-4"></path>
                </svg>
                challenges
            </a>
            <a href="scoreboard.html" class="nav-btn active">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M8 21h8"></path>
                    <path d="M12 17v4"></path>
                    <path d="M7 4h10l-1 9H8L7 4z"></path>
                    <path d="M7 4c0 0-2 1-2 4s2 4 2 4"></path>
                    <path d="M17 4c0 0 2 1 2 4s-2 4-2 4"></path>
                </svg>
                scoreboard
            </a>
            <a href="account.html" class="nav-btn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2" />
                    <circle cx="12" cy="7" r="4" />
                </svg>
                account
            </a>
        </div>
    </nav>

    <main class="scoreboard-section">
        <div class="scoreboard-container">
            <div class="scoreboard-header">
                <h1 class="scoreboard-title">Scoreboard</h1>
                <p class="scoreboard-desc">Top hackers ranked by phases completed and speed.</p>
            </div>

            <!-- leaderboard card -->
            <div class="scoreboard-card">
                <!-- table header -->
                <div class="sb-header-row">
                    <span>#</span>
                    <span></span>
                    <span>Hacker</span>
                    <span style="text-align: center;">Phase</span>
                    <span style="text-align: right;">Completed</span>
                </div>

                <!-- loading spinner -->
                <div class="sb-loader" id="sbLoader">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="var(--red)" stroke-width="2.5"
                        stroke-linecap="round">
                        <circle cx="12" cy="12" r="10" stroke-opacity="0.25" />
                        <path d="M12 2a10 10 0 0 1 10 10">
                            <animateTransform attributeName="transform" type="rotate" from="0 12 12" to="360 12 12"
                                dur="0.7s" repeatCount="indefinite" />
                        </path>
                    </svg>
                </div>

                <!-- table rows -->
                <div id="sbTableBody"></div>
            </div>

            <!-- user rank -->
            <div class="my-rank-section" id="myRankSection">
                <span class="my-rank-label">Your Rank</span>
                <div class="sb-loader">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--dark)" stroke-width="2.5"
                        stroke-linecap="round">
                        <circle cx="12" cy="12" r="10" stroke-opacity="0.25" />
                        <path d="M12 2a10 10 0 0 1 10 10">
                            <animateTransform attributeName="transform" type="rotate" from="0 12 12" to="360 12 12"
                                dur="0.7s" repeatCount="indefinite" />
                        </path>
                    </svg>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <!-- scripts -->
    <script type="module" src="src/js/script.js"></script>
    <script type="module">
        import { initNav } from './src/js/nav.js';
        import { initFooter } from './src/js/footer.js';
        import './src/js/scoreboard.js';
        initNav();
        initFooter();
    </script>
    <!-- 100% privacy-first analytics -->
    <!-- <script async src="https://scripts.simpleanalyticscdn.com/latest.js"></script>
    <noscript><img src="https://queue.simpleanalyticscdn.com/noscript.gif" alt=""
            referrerpolicy="no-referrer-when-downgrade" /></noscript> -->
</body>

</html>
